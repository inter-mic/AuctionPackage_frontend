version: 0.0
os: linux

files:
  # S3のzipの中身（リポジトリルート）を一旦ここへ展開
  - source: /
    destination: /opt/next-app/_incoming
    overwrite: true

permissions:
  - object: /opt/next-app
    owner: appuser
    group: appuser
    mode: 755
    type:
      - file
      - directory

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 1200
      runas: appuser

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 600
      runas: appuser
